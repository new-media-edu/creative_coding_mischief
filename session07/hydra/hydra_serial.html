<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hydra + Arduino Serial</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #000;
      overflow: hidden;
      font-family: "Courier New", monospace;
    }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      background: #333;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 10px 20px;
      font-family: "Courier New", monospace;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { background: #0f0; color: #000; }
    button:disabled { opacity: 0.4; cursor: default; background: #333; color: #555; border-color: #555; }

    #info {
      color: #0f0;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 4px;
    }

    #presets {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 600px;
    }

    .preset {
      background: rgba(0,0,0,0.6);
      color: #aaa;
      border: 1px solid #444;
      padding: 6px 12px;
      font-family: "Courier New", monospace;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
    }
    .preset:hover { border-color: #0f0; color: #0f0; }
    .preset.active { border-color: #0f0; color: #0f0; background: rgba(0,255,0,0.1); }
  </style>
</head>
<body>

<div id="ui">
  <button id="connect-btn" onclick="connectArduino()">Connect Arduino</button>
  <div id="info">knob1: 0.00 | knob2: 0.00</div>
</div>

<div id="presets">
  <button class="preset active" onclick="setPreset(0)">osc waves</button>
  <button class="preset" onclick="setPreset(1)">kaleidoscope</button>
  <button class="preset" onclick="setPreset(2)">noise melt</button>
  <button class="preset" onclick="setPreset(3)">feedback</button>
  <button class="preset" onclick="setPreset(4)">voronoi</button>
  <button class="preset" onclick="setPreset(5)">pixelate</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/hydra-synth@1.3.29/dist/hydra-synth.js"></script>
<script>

// --- Arduino values (normalized 0-1) ---
let knob1 = 0.5;
let knob2 = 0.5;

// --- Hydra setup ---
let hydra = new Hydra({ detectAudio: false });

// --- Presets ---
// Each preset uses () => knob1 and () => knob2 so the pots control different things

function setPreset(n) {
  document.querySelectorAll('.preset').forEach((el, i) => {
    el.classList.toggle('active', i === n);
  });

  switch(n) {
    case 0: // osc waves
      osc(() => knob1 * 60, 0.1, () => knob2 * 2)
        .color(0.9, 0.3, () => knob2)
        .rotate(() => knob1 * Math.PI)
        .out();
      break;

    case 1: // kaleidoscope
      osc(() => knob1 * 40, 0.05, () => knob2 * 3)
        .kaleid(() => 2 + knob2 * 10)
        .color(0.5, 0.3, () => knob1)
        .rotate(() => time * 0.1)
        .out();
      break;

    case 2: // noise melt
      noise(() => knob1 * 20, () => knob2 * 0.5)
        .color(() => knob1, () => knob2, () => 1 - knob1)
        .modulateRotate(osc(3), () => knob2)
        .out();
      break;

    case 3: // feedback
      osc(() => knob1 * 30, 0.1, () => knob2 * 2)
        .diff(o0)
        .rotate(() => knob2 * 0.5)
        .scale(() => 0.9 + knob1 * 0.2)
        .out();
      break;

    case 4: // voronoi
      voronoi(() => knob1 * 20, () => knob2 * 0.5, () => knob1 * 5)
        .color(() => knob2, 0.3, () => knob1)
        .rotate(() => time * 0.05)
        .modulateScale(noise(3), () => knob2 * 0.5)
        .out();
      break;

    case 5: // pixelate
      osc(() => knob1 * 50, 0.1, () => knob2 * 3)
        .color(0.9, 0.1, () => knob2)
        .pixelate(() => 2 + knob1 * 100, () => 2 + knob2 * 100)
        .rotate(() => time * 0.1)
        .out();
      break;
  }
}

// Start with first preset
setPreset(0);

// --- Web Serial ---
async function connectArduino() {
  if (!("serial" in navigator)) {
    alert("Web Serial API not supported. Use Chrome or Edge.");
    return;
  }

  try {
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });

    document.getElementById('connect-btn').disabled = true;
    document.getElementById('connect-btn').textContent = 'Arduino Connected';

    const reader = port.readable.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      let lines = buffer.split('\n');
      buffer = lines.pop();

      for (let line of lines) {
        line = line.trim();
        if (!line) continue;

        let parts = line.split(',');
        if (parts.length === 2) {
          let rawX = parseInt(parts[0]);
          let rawY = parseInt(parts[1]);

          if (!isNaN(rawX) && !isNaN(rawY)) {
            knob1 = rawX / 1023;
            knob2 = rawY / 1023;
            document.getElementById('info').textContent =
              `knob1: ${knob1.toFixed(2)} | knob2: ${knob2.toFixed(2)}`;
          }
        }
      }
    }
  } catch (err) {
    console.error('Serial error:', err);
    alert('Could not connect: ' + err.message);
  }
}

// --- Keyboard: switch presets with number keys ---
document.addEventListener('keydown', (e) => {
  let n = parseInt(e.key);
  if (n >= 1 && n <= 6) setPreset(n - 1);
});

</script>
</body>
</html>
